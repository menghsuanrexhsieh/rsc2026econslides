<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != "Home" %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <!-- apply saved / system theme before paint to avoid FOUC -->
  <script>
    (function(){
      var t = localStorage.getItem('theme');
      if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      if (t === 'dark') document.documentElement.setAttribute('data-theme','dark');
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="{{ '/' | relative_url }}">
        <span class="brand-mark">RSC</span>
        <span class="brand-text">Economics Experience</span>
      </a>
      <div class="topbar-right">
        <span class="term-badge">Summer · July 2026</span>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
          <span class="icon-light">☀</span>
          <span class="icon-dark">☽</span>
        </button>
      </div>
    </div>
  </header>

  <div class="shell">
    <main class="main">
      <div class="paper">
        {{ content }}
      </div>
      <footer class="site-footer">
        <p>{{ site.title }} &middot; {{ site.description }}</p>
        <p class="muted">&copy; {{ 'now' | date: "%Y" }}</p>
      </footer>
    </main>
  </div>

  <!-- theme toggle handler + transition class -->
  <script>
    document.documentElement.classList.add('theme-ready');
    document.getElementById('theme-toggle').addEventListener('click', function(){
      var cur = document.documentElement.getAttribute('data-theme');
      var next = cur === 'dark' ? 'light' : 'dark';
      if (next === 'dark') {
        document.documentElement.setAttribute('data-theme','dark');
      } else {
        document.documentElement.removeAttribute('data-theme');
      }
      localStorage.setItem('theme', next);
    });
  </script>
</body>
</html>
