<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != "Home" %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Home</a>
        <a href="{{ '/syllabus/' | relative_url }}"{% if page.url contains 'syllabus' %} class="active"{% endif %}>Syllabus</a>
        <a href="{{ '/slides/' | relative_url }}"{% if page.url contains 'slides' %} class="active"{% endif %}>Slides</a>
      </nav>
    </div>
  </header>

  <main class="wrap content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>{{ site.title }} &middot; {{ site.description }}</p>
      <p class="muted">&copy; {{ 'now' | date: "%Y" }} {{ site.author }}. Built with Jekyll.</p>
    </div>
  </footer>
</body>
</html>
